<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Satori Lite{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* CSS Variables for theming */
        :root {
            /* Dark theme (default) */
            --btn-close-filter: invert(1);
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #141414;
            --bg-card-header: rgba(255, 255, 255, 0.03);
            --bg-input: #0a0a0a;
            --bg-input-focus: #111111;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-focus: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent-primary: #5a5aff;
            --accent-secondary: #4040cc;
            --accent-gradient: linear-gradient(135deg, #5a5aff 0%, #3a3acc 100%);
            --danger-bg: rgba(220, 53, 69, 0.15);
            --danger-border: rgba(220, 53, 69, 0.4);
            --success-bg: rgba(40, 167, 69, 0.15);
            --success-border: rgba(40, 167, 69, 0.4);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --btn-close-filter: none;
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-header: rgba(0, 0, 0, 0.02);
            --bg-input: #f0f0f2;
            --bg-input-focus: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-color-focus: rgba(0, 0, 0, 0.2);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --accent-primary: #4a4aff;
            --accent-secondary: #3030cc;
            --accent-gradient: linear-gradient(135deg, #4a4aff 0%, #3030cc 100%);
            --danger-bg: rgba(220, 53, 69, 0.1);
            --danger-border: rgba(220, 53, 69, 0.3);
            --success-bg: rgba(40, 167, 69, 0.1);
            --success-border: rgba(40, 167, 69, 0.3);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        /* ── Navbar ──────────────────────────────────────────── */
        .satori-navbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1.25rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Brand */
        .satori-brand {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            flex-shrink: 0;
            margin-right: 0.25rem;
            text-decoration: none;
        }
        .satori-brand-logo {
            height: 26px;
            width: auto;
            flex-shrink: 0;
        }
        [data-theme="dark"] .satori-brand-logo {
            filter: invert(1);
        }
        .satori-brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        .satori-brand-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }
        .satori-brand-version {
            font-size: 0.6rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.03em;
            font-variant-numeric: tabular-nums;
        }

        /* Status chip */
        .satori-status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            flex-shrink: 0;
            font-size: 0.74rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        [data-theme="light"] .satori-status-chip {
            background: rgba(0,0,0,0.04);
        }
        .satori-countdown {
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        #sessionCountdown {
            font-variant-numeric: tabular-nums;
        }

        /* Primary nav — segmented pill */
        .satori-nav-pill {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 3px;
            gap: 1px;
            flex: 1;
            max-width: 720px;
            margin: 0 auto;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .satori-nav-pill::-webkit-scrollbar { display: none; }
        [data-theme="light"] .satori-nav-pill {
            background: rgba(0,0,0,0.04);
        }
        .snp-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.28rem;
            padding: 0.3rem 0.55rem;
            border-radius: 7px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.76rem;
            font-weight: 500;
            white-space: nowrap;
            flex: 1;
            transition: background 0.12s, color 0.12s;
        }
        .snp-item i.material-icons {
            font-size: 14px;
            opacity: 0.8;
        }
        /* When pill must shrink, hide labels and keep icons */
        @media (max-width: 1100px) {
            .snp-item span { display: none; }
            .snp-item { padding: 0.36rem 0.55rem; }
            .snp-item i.material-icons { font-size: 16px; }
            .satori-nav-pill { max-width: 380px; }
        }
        .snp-item:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text-primary);
        }
        [data-theme="light"] .snp-item:hover {
            background: rgba(0,0,0,0.06);
        }
        .snp-item.snp-active {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 1px 8px rgba(90,90,255,0.3);
        }
        .snp-item.snp-active i {
            opacity: 1;
        }

        /* Utility group */
        .satori-util-group {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.25rem;
            flex-shrink: 0;
        }
        .util-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            padding: 0.3rem 0.55rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 7px;
            color: var(--text-secondary);
            font-size: 0.775rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            white-space: nowrap;
            line-height: 1;
        }
        .util-btn i.material-icons {
            font-size: 15px;
        }
        .util-btn .util-chevron {
            font-size: 13px !important;
            opacity: 0.55;
            margin-left: -0.1rem;
        }
        .util-btn:hover, .util-btn:focus, .util-btn.show {
            background: rgba(255,255,255,0.07);
            color: var(--text-primary);
            border-color: var(--border-color-focus);
            outline: none;
        }
        [data-theme="light"] .util-btn:hover,
        [data-theme="light"] .util-btn.show {
            background: rgba(0,0,0,0.05);
        }
        .util-icon-only {
            padding: 0.3rem 0.35rem;
        }
        .util-ghost {
            border-color: transparent;
        }
        .util-ghost:hover {
            border-color: var(--border-color);
        }

        /* Vertical divider */
        .nav-vdivider {
            display: inline-block;
            width: 1px;
            height: 18px;
            background: var(--border-color);
            margin: 0 0.1rem;
            flex-shrink: 0;
        }
        .dashboard-widget-col,
        .p2p-widget-col {
            cursor: default;
        }
        .dashboard-widget-col > .card,
        .p2p-widget-col > .card {
            cursor: default;
        }
        .dashboard-widget-col .card-header,
        .p2p-widget-col .card-header {
            cursor: grab;
        }
        .dashboard-widget-col .card-header:active,
        .p2p-widget-col .card-header:active {
            cursor: grabbing;
        }
        .dashboard-widget-col.dragging,
        .p2p-widget-col.dragging {
            opacity: 0.55;
        }
        .dashboard-widget-col.drop-target .card,
        .p2p-widget-col.drop-target .card {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(90, 90, 255, 0.18);
        }

        /* Tables - override Bootstrap's white default to match dark theme */
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
            --bs-table-border-color: var(--border-color);
            color: var(--text-primary);
        }
        .table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8125rem;
            border-color: var(--border-color);
        }
        .table td {
            border-color: var(--border-color);
        }
        .table-hover > tbody > tr:hover > * {
            --bs-table-accent-bg: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }
        .drag-handle {
            display: inline-flex;
            align-items: center;
            cursor: grab;
        }
        .inactivity-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(2px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.2rem;
        }
        .inactivity-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.2rem 1.3rem;
            min-width: min(92vw, 420px);
            box-shadow: var(--shadow);
        }
        .inactivity-seconds {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }
        .inactivity-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        /* Dropdowns */
        .satori-dropdown {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 5px;
            box-shadow: var(--shadow);
            min-width: 160px;
        }
        .satori-dd-item {
            display: flex !important;
            align-items: center;
            gap: 0.45rem;
            padding: 0.4rem 0.6rem !important;
            border-radius: 6px;
            color: var(--text-secondary) !important;
            font-size: 0.8rem;
            font-weight: 500;
            transition: background 0.1s, color 0.1s;
        }
        .satori-dd-item i.material-icons {
            font-size: 16px;
            opacity: 0.7;
        }
        .satori-dd-item:hover {
            background: rgba(255,255,255,0.07) !important;
            color: var(--text-primary) !important;
        }
        [data-theme="light"] .satori-dd-item:hover {
            background: rgba(0,0,0,0.05) !important;
        }
        .satori-dd-divider {
            border-color: var(--border-color);
            margin: 4px 0;
        }
        .training-menu {
            min-width: 300px;
            max-width: min(92vw, 340px);
            padding: 0 !important;
            /* no overflow clipping — the info tooltip needs to escape */
        }

        /* ── Training-frequency slider ────────────────────────── */
        .tf-panel {
            padding: 14px 14px 12px;
        }
        .tf-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .tf-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--text-muted);
        }
        .tf-eyebrow .material-icons {
            font-size: 13px;
            opacity: 0.6;
        }
        .tf-info {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 50%;
            color: var(--text-muted);
            cursor: help;
            transition: color 0.15s, background 0.15s;
            outline: none;
        }
        .tf-info:hover,
        .tf-info:focus-visible {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        [data-theme="light"] .tf-info:hover,
        [data-theme="light"] .tf-info:focus-visible { background: rgba(0,0,0,0.05); }
        .tf-info .material-icons { font-size: 14px; }

        /* Custom tooltip — appears instantly on hover/focus */
        .tf-info::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 8px);
            right: -8px;
            width: max-content;
            max-width: 240px;
            padding: 0.5rem 0.7rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0;
            text-transform: none;
            line-height: 1.4;
            white-space: normal;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.14s ease, transform 0.14s ease;
            z-index: 2000;
        }
        /* Arrow pointing up toward the info icon */
        .tf-info::before {
            content: '';
            position: absolute;
            top: calc(100% + 2px);
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            transform: rotate(45deg);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.14s ease;
            z-index: 2001;
        }
        .tf-info:hover::after,
        .tf-info:focus-visible::after,
        .tf-info:hover::before,
        .tf-info:focus-visible::before {
            opacity: 1;
            transform: translateY(0);
        }
        .tf-info:hover::before,
        .tf-info:focus-visible::before { transform: rotate(45deg); }

        .tf-readout {
            display: flex;
            align-items: baseline;
            gap: 0.45rem;
            padding: 0.25rem 0 0.65rem;
        }
        .tf-readout-value {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tf-readout-cap {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding-bottom: 0.12rem;
        }

        /* Track wrapper so ticks can sit underneath the rail */
        .tf-track-wrap {
            position: relative;
            padding: 0.55rem 0 0.2rem;
        }

        /* Five evenly-spaced rail ticks */
        .tf-ticks {
            position: absolute;
            left: 6px; right: 6px;
            bottom: 0.35rem;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .tf-ticks span {
            width: 1px;
            height: 4px;
            background: var(--border-color);
            opacity: 0.7;
        }

        /* The range input itself */
        .tf-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 22px;
            background: transparent;
            margin: 0;
            padding: 0;
            display: block;
            cursor: pointer;
            outline: none;
            --tf-fill: 50%;
        }
        .tf-range:focus { outline: none; }

        /* WebKit track */
        .tf-range::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 999px;
            background:
                linear-gradient(90deg,
                    #5a5aff 0,
                    #8a8aff var(--tf-fill),
                    var(--bg-input) var(--tf-fill),
                    var(--bg-input) 100%);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
        }
        [data-theme="light"] .tf-range::-webkit-slider-runnable-track {
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
        }
        /* WebKit thumb */
        .tf-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px; height: 16px;
            margin-top: -7px; /* center on 4px track (with 1px borders) */
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-primary);
            box-shadow:
                0 0 0 3px rgba(90,90,255,0.12),
                0 2px 6px rgba(0,0,0,0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .tf-range:hover::-webkit-slider-thumb {
            transform: scale(1.08);
            box-shadow:
                0 0 0 5px rgba(90,90,255,0.18),
                0 3px 10px rgba(0,0,0,0.45);
        }
        .tf-range:active::-webkit-slider-thumb {
            transform: scale(0.96);
            box-shadow:
                0 0 0 6px rgba(90,90,255,0.22),
                0 2px 6px rgba(0,0,0,0.4);
        }

        /* Firefox track */
        .tf-range::-moz-range-track {
            height: 4px;
            border-radius: 999px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
        }
        .tf-range::-moz-range-progress {
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, #5a5aff, #8a8aff);
        }
        .tf-range::-moz-range-thumb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-primary);
            box-shadow:
                0 0 0 3px rgba(90,90,255,0.12),
                0 2px 6px rgba(0,0,0,0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .tf-range:hover::-moz-range-thumb {
            transform: scale(1.08);
            box-shadow:
                0 0 0 5px rgba(90,90,255,0.18),
                0 3px 10px rgba(0,0,0,0.45);
        }

        /* Legend */
        .tf-legend {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.45rem;
            padding-top: 0.6rem;
            border-top: 1px dashed var(--border-color);
            font-size: 0.66rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .tf-legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .tf-legend-item .material-icons {
            font-size: 13px;
            opacity: 0.55;
        }

        /* Navbar responsive */
        @media (max-width: 991.98px) {
            .satori-navbar {
                flex-wrap: wrap;
                height: auto;
                padding: 0.5rem 1rem;
                gap: 0.4rem;
            }
            .satori-nav-pill {
                order: 10;
                width: 100%;
                max-width: 100%;
                margin: 0;
            }
            .satori-util-group {
                margin-left: auto;
            }
        }
        @media (max-width: 640px) {
            .util-label { display: none; }
            .util-btn .util-chevron { display: none; }
        }

        /* Cards - sharp edges, minimal */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            background: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            border-radius: 8px 8px 0 0;
        }
        .card-body {
            padding: 1.25rem;
        }
        .card-body.dimmed {
            opacity: 0.5;
            pointer-events: auto;
        }
        .card-body.dimmed .pool-staking-notice {
            opacity: 1;
        }

        /* Buttons - modern and sleek */
        .btn {
            border-radius: 6px;
            font-weight: 500;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
        }
        .btn-primary:hover {
            background: var(--accent-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
            border: none;
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .btn-outline-secondary {
            border-color: var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline-secondary:hover {
            background: var(--bg-input);
            border-color: var(--border-color-focus);
            color: var(--text-primary);
        }
        .btn-outline-light {
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .btn-outline-light:hover {
            background: var(--bg-input);
            border-color: var(--border-color-focus);
            color: var(--text-primary);
        }

        /* Form controls - clean and modern */
        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 0.625rem 0.875rem;
            font-size: 0.9375rem;
        }
        .form-control:focus {
            background: var(--bg-input-focus);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(90, 90, 255, 0.15);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-control:disabled {
            background: var(--bg-input);
            opacity: 0.6;
        }

        .form-label, label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8125rem;
            margin-bottom: 0.375rem;
        }

        .form-check-input {
            background-color: var(--bg-input);
            border-color: var(--border-color);
        }
        .form-check-input:checked {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .form-check-label {
            color: var(--text-secondary);
        }

        /* Input groups */
        .input-group .btn {
            border-color: var(--border-color);
        }

        /* Status indicators */
        .status-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .status-online  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.65); }
        .status-offline { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.65); }

        /* Alerts */
        .alert-error, .alert-danger {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: #f87171;
            border-radius: 6px;
        }
        .alert-success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: #4ade80;
            border-radius: 6px;
        }
        .alert-secondary {
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid rgba(128, 128, 128, 0.2);
            color: var(--text-secondary);
            border-radius: 6px;
        }
        .alert-warning {
            background: rgba(250, 204, 21, 0.1);
            border: 1px solid rgba(250, 204, 21, 0.3);
            color: #fbbf24;
            border-radius: 6px;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .text-muted {
            color: var(--text-muted) !important;
        }
        .text-secondary {
            color: var(--text-secondary) !important;
        }
        .card, .card-body, .card-header {
            color: var(--text-primary);
        }

        /* Toast */
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .toast-header {
            background: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .toast-body {
            color: var(--text-primary);
        }

        /* Theme toggle button */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.375rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .theme-toggle .material-icons {
            font-size: 20px;
        }

        /* Form switch */
        .form-switch .form-check-input {
            width: 2.5em;
            height: 1.25em;
        }

        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Links */
        a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        a:hover {
            color: var(--accent-secondary);
        }

        /* Small text */
        .small, small {
            font-size: 0.8125rem;
        }

        /* Code */
        code {
            background: var(--bg-input);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.875rem;
            color: var(--accent-primary);
        }

        /* List groups - for pool lists */
        .list-group {
            background: transparent;
        }
        .list-group-item {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            border-radius: 6px;
        }
        .list-group-item:first-child {
            border-radius: 6px;
        }
        .list-group-item:last-child {
            border-radius: 6px;
        }
        .list-group-item-action {
            color: var(--text-primary);
        }
        .list-group-item-action:hover {
            background: var(--bg-input-focus);
            border-color: var(--border-color-focus);
            color: var(--text-primary);
        }
        .list-group-item-action:focus {
            background: var(--bg-input-focus);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(90, 90, 255, 0.15);
        }
        .list-group-item .badge {
            background: var(--accent-primary);
            color: #ffffff;
        }
        .list-group-item .text-success {
            color: #4ade80 !important;
        }

        @media (max-width: 991.98px) {
            .satori-navbar {
                align-items: flex-start;
            }
            .satori-navbar .navbar-brand {
                width: auto;
                margin-bottom: 0.45rem;
            }
            .satori-connection {
                width: 100%;
                margin-bottom: 0.4rem;
            }
            .satori-nav-actions {
                width: 100%;
                justify-content: flex-start;
                gap: 0.4rem;
            }
            .satori-nav-actions .btn {
                padding: 0.4rem 0.65rem;
            }
            .training-menu {
                min-width: min(92vw, 320px) !important;
            }
        }

        /* ── Footer community links ─────────────────────────── */
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem 0.55rem;
            padding: 1rem 0 1.2rem;
        }
        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem 0.4rem 0.65rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: -0.005em;
            text-decoration: none;
            transition:
                color 0.15s ease,
                border-color 0.15s ease,
                background 0.15s ease,
                transform 0.15s ease;
        }
        .footer-link:hover,
        .footer-link:focus-visible {
            color: var(--text-primary);
            border-color: var(--border-color-focus);
            background: var(--bg-input-focus);
            transform: translateY(-1px);
            outline: none;
        }
        .footer-link-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg-input);
            color: var(--text-muted);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .footer-link:hover .footer-link-icon,
        .footer-link:focus-visible .footer-link-icon {
            background: var(--accent-primary);
            color: #ffffff;
        }
        .footer-link-icon svg { display: block; }
        .footer-link-label { line-height: 1; }
        .footer-link-arrow {
            font-size: 13px !important;
            opacity: 0.45;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }
        .footer-link:hover .footer-link-arrow,
        .footer-link:focus-visible .footer-link-arrow {
            opacity: 0.9;
            transform: translate(2px, -2px);
        }

        /* ── Legal notice footer ───────────────────────────── */
        .legal-notice {
            max-width: 1320px;
            margin: 2.5rem auto 0;
            padding: 0 1.5rem 2rem;
        }
        .legal-notice-details { border: 0; }
        .legal-notice-details[open] { padding-bottom: 0.5rem; }
        .legal-notice-summary {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.35rem 0;
            cursor: pointer;
            user-select: none;
            outline: none;
        }
        .legal-notice-summary::-webkit-details-marker,
        .legal-notice-summary::marker { display: none; content: ''; }
        .legal-notice-rule {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
        }
        .legal-notice-trigger {
            display: inline-flex;
            align-items: baseline;
            gap: 0.65rem;
            padding: 0.25rem 0;
            color: var(--text-muted);
            font-size: 0.74rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: color 0.18s;
            white-space: nowrap;
        }
        .legal-notice-summary:hover .legal-notice-trigger,
        .legal-notice-summary:focus-visible .legal-notice-trigger {
            color: var(--text-primary);
        }
        .legal-notice-eyebrow {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--accent-primary);
            padding: 0.1rem 0.45rem;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background: transparent;
            position: relative;
            top: -1px;
        }
        .legal-notice-title {
            font-style: italic;
            letter-spacing: 0.01em;
        }
        .legal-notice-chevron {
            font-size: 16px !important;
            opacity: 0.55;
            transition: transform 0.22s ease, opacity 0.18s;
            margin-left: 0.1rem;
            position: relative;
            top: 3px;
        }
        .legal-notice-details[open] .legal-notice-chevron {
            transform: rotate(180deg);
            opacity: 0.9;
        }
        @media (max-width: 700px) {
            .legal-notice-trigger { white-space: normal; flex-wrap: wrap; }
            .legal-notice-rule { display: none; }
            .legal-notice-summary { justify-content: flex-start; }
        }

        /* Expanded document body */
        .legal-doc {
            max-width: 880px;
            margin: 1.8rem auto 0;
            padding: 2rem 0 0;
            border-top: 1px solid var(--border-color);
            animation: legalFadeUp 0.38s cubic-bezier(.2,.8,.2,1) both;
        }
        @keyframes legalFadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .legal-doc-head {
            text-align: left;
            margin-bottom: 2.2rem;
        }
        .legal-doc-kicker {
            display: inline-block;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--text-muted);
            padding-bottom: 0.85rem;
            position: relative;
        }
        .legal-doc-kicker::after {
            content: '';
            position: absolute;
            left: 0; bottom: 0.3rem;
            width: 28px; height: 2px;
            background: var(--accent-primary);
        }
        .legal-doc-title {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.12;
            margin: 0.3rem 0 0.8rem;
            color: var(--text-primary);
        }
        .legal-doc-title span {
            font-style: italic;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .legal-doc-lede {
            max-width: 56ch;
            color: var(--text-secondary);
            font-size: 0.92rem;
            line-height: 1.55;
            margin: 0;
        }
        .legal-section {
            display: grid;
            grid-template-columns: 4rem 1fr;
            gap: 0.75rem 1.5rem;
            padding: 1.4rem 0;
            border-top: 1px dashed var(--border-color);
        }
        .legal-section:first-of-type {
            border-top: 0;
            padding-top: 0.2rem;
        }
        .legal-section-num {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent-primary);
            letter-spacing: 0.05em;
            padding-top: 0.35rem;
            opacity: 0.9;
        }
        .legal-section-body h3 {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-primary);
            margin: 0 0 0.9rem;
        }
        .legal-section-body p {
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text-secondary);
            margin: 0 0 0.75rem;
        }
        .legal-section-body p:last-child { margin-bottom: 0; }
        .legal-label {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-primary);
            margin-right: 0.15rem;
        }
        .legal-list {
            list-style: none;
            padding: 0;
            margin: 0 0 0.5rem;
            counter-reset: legal-bullet;
        }
        .legal-list li {
            position: relative;
            padding: 0.25rem 0 0.25rem 1.4rem;
            font-size: 0.88rem;
            line-height: 1.6;
            color: var(--text-secondary);
            counter-increment: legal-bullet;
        }
        .legal-list li::before {
            content: counter(legal-bullet, lower-roman);
            position: absolute;
            left: 0;
            top: 0.35rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--accent-primary);
            letter-spacing: 0.06em;
            opacity: 0.8;
            min-width: 1.1rem;
        }
        .legal-contact {
            font-style: normal;
            display: inline-flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-top: 0.6rem;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-card);
        }
        .legal-contact-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.005em;
        }
        .legal-contact-mail {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.82rem;
            color: var(--accent-primary);
            width: fit-content;
        }
        .legal-contact-mail .material-icons {
            font-size: 14px;
            transition: transform 0.18s ease;
        }
        .legal-contact-mail:hover .material-icons {
            transform: translate(2px, -2px);
        }
        @media (max-width: 620px) {
            .legal-section {
                grid-template-columns: 2.4rem 1fr;
                gap: 0.4rem 1rem;
            }
            .legal-doc-title { font-size: 1.35rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <div id="inactivityOverlay" class="inactivity-overlay" aria-hidden="true">
        <div class="inactivity-card">
            <div class="inactivity-seconds" id="inactivitySeconds">20</div>
            <div class="inactivity-text">
                You will be logged out in <span id="inactivitySecondsInline">20</span>s due to inactivity.
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script>
        // Theme management
        function getStoredTheme() {
            return localStorage.getItem('satori-theme') || 'dark';
        }
        function setStoredTheme(theme) {
            localStorage.setItem('satori-theme', theme);
        }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            setStoredTheme(theme);
            // Update toggle icon
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
            }
        }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }
        // Apply stored theme on load
        document.documentElement.setAttribute('data-theme', getStoredTheme());

        // Auto-logout after inactivity on authenticated pages (if navbar countdown exists)
        (function initInactivityLogout() {
            const countdownEl = document.getElementById('sessionCountdown');
            if (!countdownEl) return;

            const timeoutSeconds = 300; // 5 minutes
            const warningThreshold = 20;
            let remaining = timeoutSeconds;
            let intervalId = null;
            const overlay = document.getElementById('inactivityOverlay');
            const overlaySeconds = document.getElementById('inactivitySeconds');
            const overlaySecondsInline = document.getElementById('inactivitySecondsInline');

            function formatMMSS(total) {
                const m = Math.floor(total / 60);
                const s = total % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function render() {
                countdownEl.textContent = formatMMSS(Math.max(0, remaining));
                if (overlay && overlaySeconds && overlaySecondsInline) {
                    if (remaining <= warningThreshold) {
                        overlay.style.display = 'flex';
                        overlay.setAttribute('aria-hidden', 'false');
                        overlaySeconds.textContent = String(Math.max(0, remaining));
                        overlaySecondsInline.textContent = String(Math.max(0, remaining));
                    } else {
                        overlay.style.display = 'none';
                        overlay.setAttribute('aria-hidden', 'true');
                    }
                }
            }

            function resetTimer() {
                remaining = timeoutSeconds;
                render();
            }

            const activityEvents = ['click', 'keydown', 'mousemove', 'scroll', 'touchstart'];
            activityEvents.forEach((evt) => {
                window.addEventListener(evt, resetTimer, { passive: true });
            });

            render();
            intervalId = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    window.location.href = '/logout';
                    return;
                }
                render();
            }, 1000);
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
