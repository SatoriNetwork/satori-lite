<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Satori Lite{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* CSS Variables for theming */
        :root {
            /* Dark theme (default) */
            --btn-close-filter: invert(1);
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #141414;
            --bg-card-header: rgba(255, 255, 255, 0.03);
            --bg-input: #0a0a0a;
            --bg-input-focus: #111111;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-focus: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent-primary: #5a5aff;
            --accent-secondary: #4040cc;
            --accent-gradient: linear-gradient(135deg, #5a5aff 0%, #3a3acc 100%);
            --accent-on: #ffffff;
            --danger-bg: rgba(220, 53, 69, 0.15);
            --danger-border: rgba(220, 53, 69, 0.4);
            --success-bg: rgba(40, 167, 69, 0.15);
            --success-border: rgba(40, 167, 69, 0.4);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --btn-close-filter: none;
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-header: rgba(0, 0, 0, 0.02);
            --bg-input: #f0f0f2;
            --bg-input-focus: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --border-color-focus: rgba(0, 0, 0, 0.2);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --accent-primary: #4a4aff;
            --accent-secondary: #3030cc;
            --accent-gradient: linear-gradient(135deg, #4a4aff 0%, #3030cc 100%);
            --accent-on: #ffffff;
            --danger-bg: rgba(220, 53, 69, 0.1);
            --danger-border: rgba(220, 53, 69, 0.3);
            --success-bg: rgba(40, 167, 69, 0.1);
            --success-border: rgba(40, 167, 69, 0.3);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-weight: 400;
            letter-spacing: -0.01em;
            position: relative;
            overflow-x: hidden;
        }

        /* ──────────────────────────────────────────────────────
           NAVBAR — progressive enhancement
           BASELINE: the original flat navbar. Zero GPU cost.
                     Runs everywhere, including Pi-class boxes
                     that view the UI via a local browser.
           ENHANCED: liquid glass, only when `html.glass-nav` is
                     set by the capability-detect script below.
                     That script opts in when the browser supports
                     backdrop-filter AND the user hasn't asked for
                     reduced transparency AND the device reports
                     enough cores/memory to composite smoothly.
           ────────────────────────────────────────────────────── */

        /* ── Baseline flat navbar ───────────────────────────── */
        .satori-navbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1.25rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Brand */
        .satori-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
            margin-right: 0.25rem;
            text-decoration: none;
            line-height: 1;
        }
        .satori-brand-logo {
            height: 34px;
            width: auto;
            flex-shrink: 0;
            display: block;
        }
        [data-theme="dark"] .satori-brand-logo {
            filter: invert(1);
        }
        .satori-brand-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.15rem;
            line-height: 1;
        }
        .satori-brand-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.035em;
            line-height: 1;
        }
        .satori-brand-version {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        /* Status chip */
        .satori-status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            flex-shrink: 0;
            font-size: 0.74rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        [data-theme="light"] .satori-status-chip {
            background: rgba(0,0,0,0.04);
        }
        .satori-countdown {
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        #sessionCountdown {
            font-variant-numeric: tabular-nums;
        }

        /* Primary nav — segmented pill */
        /* Wrapper provides positioning context for scroll zones; pill lives inside */
        .snp-scroll-wrap {
            flex: 1;
            min-width: 0;
            position: relative;
            display: flex;
            align-items: stretch;
            max-width: 720px;
            margin: 0 auto;
        }
        .satori-nav-pill {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 3px;
            gap: 1px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }
        .satori-nav-pill::-webkit-scrollbar { display: none; }
        [data-theme="light"] .satori-nav-pill {
            background: rgba(0,0,0,0.04);
        }
        .snp-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.28rem;
            padding: 0.3rem 0.55rem;
            border-radius: 7px;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.76rem;
            font-weight: 500;
            white-space: nowrap;
            flex: 1;
            transition: background 0.12s, color 0.12s;
        }
        .snp-item i.material-icons {
            font-size: 14px;
            opacity: 0.8;
        }
        @media (max-width: 1100px) {
            .snp-item span { display: none; }
            .snp-item { padding: 0.36rem 0.55rem; }
            .snp-item i.material-icons { font-size: 16px; }
            .snp-scroll-wrap { max-width: 380px; }
        }
        .snp-item:hover {
            background: rgba(255,255,255,0.07);
            color: var(--text-primary);
        }
        [data-theme="light"] .snp-item:hover {
            background: rgba(0,0,0,0.06);
        }
        .snp-item.snp-active {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 1px 8px rgba(90,90,255,0.3);
        }
        .snp-item.snp-active i { opacity: 1; }

        /* ── Scroll zones: fixed overlays on wrapper edges, outside the scrollable pill ── */
        .snp-scroll-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 52px;
            display: flex;
            align-items: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .snp-scroll-zone.snp-visible {
            opacity: 1;
            pointer-events: auto;
        }
        .snp-scroll-zone i.material-icons {
            font-size: 18px;
            color: var(--text-secondary);
            transition: color 0.15s ease, transform 0.15s ease;
        }
        .snp-scroll-zone:hover i.material-icons { color: var(--text-primary); }
        .snp-scroll-left {
            left: 0;
            justify-content: flex-start;
            padding-left: 4px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, transparent 100%);
            border-radius: 10px 0 0 10px;
            cursor: w-resize;
        }
        .snp-scroll-right {
            right: 0;
            justify-content: flex-end;
            padding-right: 4px;
            background: linear-gradient(270deg, var(--bg-secondary) 25%, transparent 100%);
            border-radius: 0 10px 10px 0;
            cursor: e-resize;
        }
        .snp-scroll-left.snp-scroll-active i.material-icons {
            animation: snp-nudge-left 0.55s ease-in-out infinite;
        }
        .snp-scroll-right.snp-scroll-active i.material-icons {
            animation: snp-nudge-right 0.55s ease-in-out infinite;
        }
        @keyframes snp-nudge-left {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-3px); }
        }
        @keyframes snp-nudge-right {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(3px); }
        }

        /* Utility group */
        .satori-util-group {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            margin-left: 0.25rem;
            flex-shrink: 0;
        }
        .util-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.28rem;
            padding: 0.3rem 0.55rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 7px;
            color: var(--text-secondary);
            font-size: 0.775rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            white-space: nowrap;
            line-height: 1;
        }
        .util-btn i.material-icons {
            font-size: 15px;
        }
        .util-btn .util-chevron {
            font-size: 13px !important;
            opacity: 0.55;
            margin-left: -0.1rem;
            transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .util-btn:hover, .util-btn:focus, .util-btn.show {
            background: rgba(255,255,255,0.07);
            color: var(--text-primary);
            border-color: var(--border-color-focus);
            outline: none;
        }
        .util-btn:active { transform: scale(0.97); }
        .util-btn.show .util-chevron { transform: rotate(180deg); }
        [data-theme="light"] .util-btn:hover,
        [data-theme="light"] .util-btn.show {
            background: rgba(0,0,0,0.05);
        }
        .util-icon-only {
            padding: 0.3rem 0.35rem;
        }
        .util-ghost {
            border-color: transparent;
        }
        .util-ghost:hover {
            border-color: var(--border-color);
        }

        .nav-vdivider {
            display: inline-block;
            width: 1px;
            height: 18px;
            background: var(--border-color);
            margin: 0 0.1rem;
            flex-shrink: 0;
        }

        /* ══════════════════════════════════════════════════════
           LIQUID GLASS ENHANCEMENT — only on capable devices
           All rules below only apply when html.glass-nav is set.
           ══════════════════════════════════════════════════════ */

        /* Ambient orbs — only rendered in glass mode */
        html.glass-nav body::before {
            content: '';
            position: absolute;
            top: -160px;
            left: 5%;
            width: 55vmax;
            height: 300px;
            background: radial-gradient(
                ellipse 60% 80% at 50% 50%,
                rgba(90, 90, 255, 0.28),
                rgba(90, 90, 255, 0) 70%
            );
            filter: blur(30px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.75;
        }
        html.glass-nav body::after {
            content: '';
            position: absolute;
            top: -140px;
            right: 8%;
            width: 45vmax;
            height: 280px;
            background: radial-gradient(
                ellipse 60% 80% at 50% 50%,
                rgba(180, 90, 255, 0.22),
                rgba(180, 90, 255, 0) 70%
            );
            filter: blur(30px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }
        html.glass-nav[data-theme="light"] body::before {
            background: radial-gradient(
                ellipse 60% 80% at 50% 50%,
                rgba(120, 120, 255, 0.25),
                rgba(120, 120, 255, 0) 70%
            );
            opacity: 0.9;
        }
        html.glass-nav[data-theme="light"] body::after {
            background: radial-gradient(
                ellipse 60% 80% at 50% 50%,
                rgba(255, 170, 220, 0.28),
                rgba(255, 170, 220, 0) 70%
            );
            opacity: 0.85;
        }
        /* Sit body children above the ambient glass orbs (z-index:0),
           but exclude Bootstrap modals/backdrops — they need their
           native position:fixed to overlay the viewport instead of
           rendering inline below the page content. */
        html.glass-nav body > *:not(.modal):not(.modal-backdrop) { position: relative; z-index: 1; }

        /* Navbar glass shell */
        html.glass-nav .satori-navbar {
            padding: 0 14px;
            height: 58px;
            position: relative;
            z-index: 1050;
            isolation: isolate;
            margin: 12px 12px 0;
            border-radius: 20px;
            overflow: visible;
            background:
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.12) 0%,
                    rgba(255, 255, 255, 0.03) 45%,
                    rgba(255, 255, 255, 0.07) 100%
                ),
                rgba(22, 22, 28, 0.48);
            -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
            backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                inset 0 1px 0 0 rgba(255, 255, 255, 0.22),
                inset 1px 0 0 0 rgba(255, 255, 255, 0.08),
                inset -1px 0 0 0 rgba(0, 0, 0, 0.18),
                inset 0 -1px 0 0 rgba(0, 0, 0, 0.35),
                0 12px 40px -10px rgba(0, 0, 0, 0.55),
                0 2px 8px -2px rgba(0, 0, 0, 0.35);
        }
        html.glass-nav[data-theme="light"] .satori-navbar {
            background:
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.85) 0%,
                    rgba(255, 255, 255, 0.55) 50%,
                    rgba(255, 255, 255, 0.78) 100%
                ),
                rgba(245, 245, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow:
                inset 0 1px 0 0 rgba(255, 255, 255, 0.95),
                inset 1px 0 0 0 rgba(255, 255, 255, 0.5),
                inset -1px 0 0 0 rgba(0, 0, 0, 0.03),
                inset 0 -1px 0 0 rgba(0, 0, 0, 0.06),
                0 12px 40px -10px rgba(60, 60, 110, 0.18),
                0 2px 8px -2px rgba(0, 0, 0, 0.08);
        }

        /* Cursor-tracked top specular */
        html.glass-nav .satori-navbar::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(
                700px 140px at var(--mx, 30%) -10%,
                rgba(255, 255, 255, 0.18),
                rgba(255, 255, 255, 0) 55%
            );
            pointer-events: none;
            z-index: 1;
            opacity: 0.95;
        }
        html.glass-nav[data-theme="light"] .satori-navbar::before {
            background: radial-gradient(
                700px 140px at var(--mx, 30%) -10%,
                rgba(255, 255, 255, 0.8),
                rgba(255, 255, 255, 0) 55%
            );
        }

        /* Slow ambient sweep */
        html.glass-nav .satori-navbar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(
                115deg,
                rgba(255, 255, 255, 0) 30%,
                rgba(255, 255, 255, 0.14) 45%,
                rgba(255, 255, 255, 0.22) 50%,
                rgba(255, 255, 255, 0.14) 55%,
                rgba(255, 255, 255, 0) 70%
            );
            background-size: 220% 100%;
            background-position: 120% 0;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: sgn-sheen 11s ease-in-out infinite;
            animation-delay: 4s;
        }
        html.glass-nav[data-theme="light"] .satori-navbar::after {
            background: linear-gradient(
                115deg,
                rgba(255, 255, 255, 0) 30%,
                rgba(255, 255, 255, 0.55) 45%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0.55) 55%,
                rgba(255, 255, 255, 0) 70%
            );
            background-size: 220% 100%;
            background-position: 120% 0;
            background-repeat: no-repeat;
        }
        @keyframes sgn-sheen {
            0%        { background-position: 120% 0; opacity: 0; }
            8%        { opacity: 0.9; }
            48%       { background-position: -20% 0; opacity: 0.9; }
            55%, 100% { background-position: -20% 0; opacity: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            html.glass-nav .satori-navbar::after { animation: none; opacity: 0; }
        }
        html.glass-nav .satori-navbar > * {
            position: relative;
            z-index: 2;
            transform: translateZ(0);
        }

        /* Logo glow (glass only) */
        html.glass-nav .satori-brand { padding: 0 0.15rem; }
        html.glass-nav .satori-brand-logo {
            filter: drop-shadow(0 1px 4px rgba(90, 90, 255, 0.25));
        }
        html.glass-nav[data-theme="dark"] .satori-brand-logo {
            filter: invert(1) drop-shadow(0 1px 4px rgba(140, 140, 255, 0.35));
        }

        /* Status chip as glass capsule */
        html.glass-nav .satori-status-chip {
            gap: 0.4rem;
            padding: 0.32rem 0.7rem;
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02)),
                rgba(0,0,0,0.12);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2);
        }
        html.glass-nav[data-theme="light"] .satori-status-chip {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.6)),
                rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.05);
        }

        /* Inset glass capsule for the primary nav */
        html.glass-nav .snp-scroll-wrap { max-width: 760px; }
        html.glass-nav .satori-nav-pill {
            padding: 4px;
            gap: 2px;
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(0,0,0,0.22), rgba(0,0,0,0.08)),
                rgba(255,255,255,0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow:
                inset 0 1px 2px rgba(0, 0, 0, 0.38),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05);
        }
        html.glass-nav[data-theme="light"] .satori-nav-pill {
            background:
                linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.01)),
                rgba(255,255,255,0.25);
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow:
                inset 0 1px 2px rgba(0, 0, 0, 0.07),
                inset 0 -1px 0 rgba(255, 255, 255, 0.6);
        }

        /* Nav items become glass buttons with animated hover bubbles */
        html.glass-nav .snp-item {
            position: relative;
            gap: 0.35rem;
            padding: 0.42rem 0.7rem;
            border-radius: 999px;
            z-index: 1;
            background: transparent;
            transition:
                color 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html.glass-nav .snp-item i.material-icons {
            font-size: 15px;
            opacity: 0.78;
            transition: opacity 0.2s;
        }
        @media (max-width: 1100px) {
            html.glass-nav .snp-item { padding: 0.5rem 0.55rem; }
            html.glass-nav .snp-item i.material-icons { font-size: 17px; }
        }
        html.glass-nav .snp-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: rgba(255, 255, 255, 0.08);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 -1px 0 rgba(0, 0, 0, 0.08);
            opacity: 0;
            transform: scale(0.94);
            transition:
                opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }
        html.glass-nav[data-theme="light"] .snp-item::before {
            background: rgba(255, 255, 255, 0.7);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 1),
                inset 0 -1px 0 rgba(0, 0, 0, 0.04);
        }
        html.glass-nav .snp-item:hover {
            background: transparent;
            color: var(--text-primary);
        }
        html.glass-nav[data-theme="light"] .snp-item:hover {
            background: transparent;
        }
        html.glass-nav .snp-item:hover::before {
            opacity: 1;
            transform: scale(1);
        }
        html.glass-nav .snp-item.snp-active {
            background: transparent;
            box-shadow: none;
            color: #fff;
            text-shadow: 0 1px 2px rgba(30, 30, 120, 0.3);
        }
        html.glass-nav .snp-item.snp-active::before {
            opacity: 1;
            transform: scale(1);
            background:
                linear-gradient(
                    160deg,
                    rgba(255, 255, 255, 0.42) 0%,
                    rgba(255, 255, 255, 0.16) 26%,
                    rgba(255, 255, 255, 0.02) 52%,
                    rgba(255, 255, 255, 0) 100%
                ),
                linear-gradient(135deg, #6e6eff 0%, #4a4add 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(0, 0, 0, 0.18),

        /* ── Dropdowns: baseline flat ──
           NOTE: Bootstrap/Popper writes an inline `transform` to

           `translate` property (not `transform`) so the two
           compose cleanly — otherwise the animation would wipe
           out Popper's positioning and the menu pops-then-drops
           into place. `translate` also animates on the compositor. */
        .satori-dropdown {
            background: var(--bg-card);

        html.glass-nav .satori-dropdown.training-menu {

        /* ── Training-frequency slider ────────────────────────── */
        .tf-panel {

        .tf-head {

            position: relative;

            justify-content: center;

            transition: color 0.15s, background 0.15s;
            outline: none;
        }
        .tf-info:hover,
        .tf-info:focus-visible {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        [data-theme="light"] .tf-info:hover,
        [data-theme="light"] .tf-info:focus-visible { background: rgba(0,0,0,0.05); }
        .tf-info .material-icons { font-size: 14px; }

        /* Custom tooltip — appears instantly on hover/focus */
        .tf-info::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 8px);
            right: -8px;
            width: max-content;
            max-width: 240px;
            padding: 0.5rem 0.7rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0;
            text-transform: none;
            line-height: 1.4;
            white-space: normal;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
            transition: opacity 0.14s ease, transform 0.14s ease;
            z-index: 2000;
        }
        /* Arrow pointing up toward the info icon */
        .tf-info::before {
            content: '';
            position: absolute;
            top: calc(100% + 2px);
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            transform: rotate(45deg);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.14s ease;
            z-index: 2001;
        }
        .tf-info:hover::after,
        .tf-info:focus-visible::after,
        .tf-info:hover::before,
        .tf-info:focus-visible::before {
            opacity: 1;
            transform: translateY(0);
        }
        .tf-info:hover::before,
        .tf-info:focus-visible::before { transform: rotate(45deg); }

        .tf-readout {
            display: flex;

            gap: 0.45rem;
            padding: 0.25rem 0 0.65rem;
        }
        .tf-readout-value {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-primary);

        /* Track wrapper so ticks can sit underneath the rail */

            position: relative;
            padding: 0.55rem 0 0.2rem;

        /* Five evenly-spaced rail ticks */
        .tf-ticks {
            position: absolute;

            height: 4px;

        /* The range input itself */
        .tf-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 22px;
            background: transparent;
            margin: 0;
            padding: 0;
            display: block;
            cursor: pointer;
            outline: none;

        /* WebKit track */
        .tf-range::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 999px;
            background:
                linear-gradient(90deg,
                    #5a5aff 0,
                    #8a8aff var(--tf-fill),
                    var(--bg-input) var(--tf-fill),
                    var(--bg-input) 100%);
            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);

        [data-theme="light"] .tf-range::-webkit-slider-runnable-track {
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
        }
        /* WebKit thumb */
        .tf-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px; height: 16px;
            margin-top: -7px; /* center on 4px track (with 1px borders) */
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-primary);
            box-shadow:
                0 0 0 3px rgba(90,90,255,0.12),
                0 2px 6px rgba(0,0,0,0.35);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .tf-range:hover::-webkit-slider-thumb {
            transform: scale(1.08);

                0 0 0 5px rgba(90,90,255,0.18),
                0 3px 10px rgba(0,0,0,0.45);

        .tf-range:active::-webkit-slider-thumb {

            box-shadow:

                0 2px 6px rgba(0,0,0,0.4);

        .tf-range::-moz-range-track {

            border: 1px solid var(--border-color);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);

        .tf-range::-moz-range-progress {

            border-radius: 999px;

        .tf-range::-moz-range-thumb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid var(--accent-primary);

        .tf-range:hover::-moz-range-thumb {

            html[data-theme="light"] .util-mobile-menu .dropdown-menu,
            html.glass-nav[data-theme="light"] .util-mobile-menu .dropdown-menu {
                background: #ffffff !important;
                background-image: none !important;
                border: 1px solid rgba(0, 0, 0, 0.12) !important;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18) !important;
            }
            .util-mobile-menu .tf-panel {
                padding: 0.6rem 0.75rem 0.5rem !important;
            }

                font-size: 1rem !important;
            }
            .util-mobile-menu .tf-readout-cap {
                font-size: 0.6rem !important;
            }
        }
        /* Navbar responsive — glass */
        @media (max-width: 991.98px) {
            html.glass-nav .satori-navbar {
                padding: 0.6rem 0.9rem;
                gap: 0.45rem;
                margin: 10px 10px 0;
                border-radius: 18px;
            }
        }
        @media (max-width: 640px) {
            html.glass-nav .satori-navbar {
                margin: 8px 8px 0;
                padding: 0.55rem 0.7rem;
                flex-wrap: nowrap;
            }
        }

        /* Cards - sharp edges, minimal */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }
        .card-header {
            background: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
            border-radius: 8px 8px 0 0;
        }
        .card-body {
            padding: 1.25rem;
        }
        .card-body.dimmed {
            opacity: 0.5;
            pointer-events: auto;
        }
        .card-body.dimmed .pool-staking-notice {
            opacity: 1;
        }

        /* Buttons - modern and sleek */
        .btn {
            border-radius: 6px;
            font-weight: 500;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            letter-spacing: -0.01em;
            transition: filter 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #b02a37 100%);
            border: none;
            color: #ffffff;
        }
        .btn-danger:hover {
            background: #b02a37;
        }
        .btn-outline-secondary {
            border-color: var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline-secondary:hover {
            background: var(--bg-input);
            border-color: var(--border-color-focus);
            color: var(--text-primary);
        }
        .btn-outline-light {
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .btn-outline-light:hover {
            background: var(--bg-input);
            border-color: var(--border-color-focus);
            color: var(--text-primary);
        }

        /* Form controls - clean and modern */
        .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            padding: 0.625rem 0.875rem;
            font-size: 0.9375rem;
        }
        .form-control:focus {
            background: var(--bg-input-focus);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(90, 90, 255, 0.15);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-control:disabled {
            background: var(--bg-input);
            opacity: 0.6;
        }

        .form-label, label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8125rem;
            margin-bottom: 0.375rem;
        }

        .form-check-input {
            background-color: var(--bg-input);
            border-color: var(--border-color);
        }
        .form-check-input:checked {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .form-check-label {
            color: var(--text-secondary);
        }

        /* Input groups */
        .input-group .btn {
            border-color: var(--border-color);
        }

        /* Status indicators */
        .status-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .status-online  { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.65); }
        .status-offline { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.65); }

        /* Alerts */
        .alert-error, .alert-danger {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: #f87171;
            border-radius: 6px;
        }
        .alert-success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: #4ade80;
            border-radius: 6px;
        }
        .alert-secondary {
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid rgba(128, 128, 128, 0.2);
            color: var(--text-secondary);
            border-radius: 6px;
        }
        .alert-warning {
            background: rgba(250, 204, 21, 0.1);
            border: 1px solid rgba(250, 204, 21, 0.3);
            color: #fbbf24;
            border-radius: 6px;

        /* Typography */
        h1, h2, h3, h4, h5, h6 {

            font-weight: 600;
            letter-spacing: -0.02em;

        .text-secondary {
            color: var(--text-secondary) !important;

            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .toast-header {
            background: var(--bg-card-header);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);

        .toast-body {
            color: var(--text-primary);

        /* Theme toggle button */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.375rem 0.5rem;
            border-radius: 6px;

            align-items: center;
            justify-content: center;

            background: var(--bg-input);

            font-size: 20px;

        .form-switch .form-check-input {

            width: 8px;
            height: 8px;

            background: var(--bg-primary);

            background: var(--border-color);

            color: var(--accent-primary);

        /* ── Footer community links ─────────────────────────── */
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem 0.55rem;
            padding: 1rem 0 1.2rem;

            display: inline-flex;
            align-items: center;

            padding: 0.4rem 0.8rem 0.4rem 0.65rem;

            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: -0.005em;
            text-decoration: none;

                color 0.15s ease,
                border-color 0.15s ease,
                background 0.15s ease,
                transform 0.15s ease;
        }
        .footer-link:hover,
        .footer-link:focus-visible {
            color: var(--text-primary);
            border-color: var(--border-color-focus);

        /* ── Legal notice footer ───────────────────────────── */
        .legal-notice {
            max-width: 1320px;
            margin: 2.5rem auto 0;
            padding: 0 1.5rem 2rem;

        .legal-notice-details { border: 0; }
        .legal-notice-details[open] { padding-bottom: 0.5rem; }

            list-style: none;

            align-items: center;
            gap: 1rem;

        .legal-notice-summary::-webkit-details-marker,
        .legal-notice-summary::marker { display: none; content: ''; }
        .legal-notice-rule {
            flex: 1;

        /* Expanded document body */
        .legal-doc {
            max-width: 880px;

        .legal-doc-head {

        .legal-doc-kicker {
            display: inline-block;

            font-size: 0.62rem;

        .legal-doc-title {

        .legal-section {

        .legal-section-body h3 {
            font-size: 0.72rem;

        .legal-section-body p:last-child { margin-bottom: 0; }
        .legal-label {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.72rem;

        .legal-list li::before {

    </style>
    <script>
        /* Liquid-glass capability detect — runs BEFORE body renders
           to avoid a flash. Opts in only when the browser can
           composite backdrop-filter smoothly AND the user hasn't
           asked for reduced transparency AND the device reports
           enough cores/memory to sustain it. Otherwise the navbar
           falls back to the original flat design. */
        (function () {
            try {
                const stored = localStorage.getItem('satori-glass-nav');
                if (stored === 'off') return;
                if (stored === 'on') {
                    document.documentElement.classList.add('glass-nav');
                    return;
                }
                const supportsBackdrop =
                    (window.CSS && CSS.supports &&
                        (CSS.supports('backdrop-filter', 'blur(1px)') ||
                         CSS.supports('-webkit-backdrop-filter', 'blur(1px)')));
                const reducedTransparency =
                    window.matchMedia && matchMedia('(prefers-reduced-transparency: reduce)').matches;
                const cores = navigator.hardwareConcurrency || 4;
                const mem   = navigator.deviceMemory || 4;
                const okHardware = cores >= 4 && mem >= 2;
                if (supportsBackdrop && !reducedTransparency && okHardware) {
                    document.documentElement.classList.add('glass-nav');
                }
            } catch (_) { /* no-op — fall back to flat */ }
        })();
    </script>

<body>
    {% block content %}{% endblock %}
    <div id="inactivityOverlay" class="inactivity-overlay" aria-hidden="true">
        <div class="inactivity-card">
            <div class="inactivity-seconds" id="inactivitySeconds">20</div>
            <div class="inactivity-text">
                You will be logged out in <span id="inactivitySecondsInline">20</span>s due to inactivity.
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script>
        // Theme management
        function getStoredTheme() {
            return localStorage.getItem('satori-theme') || 'dark';
        }
        function setStoredTheme(theme) {
            localStorage.setItem('satori-theme', theme);
        }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            setStoredTheme(theme);
            // Update toggle icon
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
            }
        }
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }
        // Apply stored theme on load
        document.documentElement.setAttribute('data-theme', getStoredTheme());

        // Auto-logout after inactivity on authenticated pages (if navbar countdown exists)
        (function initInactivityLogout() {
            const countdownEl = document.getElementById('sessionCountdown');
            if (!countdownEl) return;

            const timeoutSeconds = 300; // 5 minutes
            const warningThreshold = 20;
            let remaining = timeoutSeconds;
            let intervalId = null;
            const overlay = document.getElementById('inactivityOverlay');
            const overlaySeconds = document.getElementById('inactivitySeconds');
            const overlaySecondsInline = document.getElementById('inactivitySecondsInline');

            function formatMMSS(total) {
                const m = Math.floor(total / 60);
                const s = total % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function render() {
                countdownEl.textContent = formatMMSS(Math.max(0, remaining));
                if (overlay && overlaySeconds && overlaySecondsInline) {
                    if (remaining <= warningThreshold) {
                        overlay.style.display = 'flex';
                        overlay.setAttribute('aria-hidden', 'false');
                        overlaySeconds.textContent = String(Math.max(0, remaining));
                        overlaySecondsInline.textContent = String(Math.max(0, remaining));
                    } else {
                        overlay.style.display = 'none';
                        overlay.setAttribute('aria-hidden', 'true');
                    }
                }
            }

            function resetTimer() {
                remaining = timeoutSeconds;
                render();
            }

            const activityEvents = ['click', 'keydown', 'mousemove', 'scroll', 'touchstart'];
            activityEvents.forEach((evt) => {
                window.addEventListener(evt, resetTimer, { passive: true });
            });

            render();
            intervalId = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    window.location.href = '/logout';
                    return;
                }
                render();
            }, 1000);
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
